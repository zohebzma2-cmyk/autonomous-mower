<script>
const K='mower-shop-v1', st=JSON.parse(localStorage.getItem(K)||'{}');
const its=[...document.querySelectorAll('.it')];
function upd(){ const n=its.filter(e=>e.querySelector('input').checked).length;
  document.getElementById('bar').textContent=n+' / '+its.length+' ordered'; }
its.forEach(e=>{ const c=e.querySelector('input'), k=e.dataset.k;
  c.checked=!!st[k]; e.classList.toggle('done',c.checked);
  c.addEventListener('change',()=>{ st[k]=c.checked; localStorage.setItem(K,JSON.stringify(st));
    e.classList.toggle('done',c.checked); upd(); }); });
upd();
